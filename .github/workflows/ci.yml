name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protocol:
    name: Protocol checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build CLI and contracts
        run: npm run build

      - name: Audit dependencies
        run: npm audit
